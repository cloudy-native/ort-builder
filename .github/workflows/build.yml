name: Build ORT Static Libraries

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Release
        run: |
          cd onnxruntime
          python tools/ci_build/build.py \
            --build_dir ../build/Release \
            --config Release \
            --parallel \
            --compile_no_warning_as_error \
            --skip_tests \
            --cmake_extra_defines onnxruntime_BUILD_SHARED_LIB=OFF \
            --cmake_extra_defines onnxruntime_ENABLE_LTO=OFF \
            --cmake_extra_defines CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL \
            --update --build
        shell: bash

      - name: Package
        run: |
          mkdir -p package/lib package/include
          cp onnxruntime/include/onnxruntime/core/session/*.h package/include/
          find build/Release/Release -name "*.lib" -exec cp {} package/lib/ \;
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-static-win-x64
          path: package/
